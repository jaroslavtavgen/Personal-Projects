<body>   	
    <script>
document.getElementsByTagName(`html`)[0].innerHTML = ``;

let div = document.createElement(`div`);
div.id = `game`
document.body.appendChild(div);

div = document.createElement(`span`);
div.id = `problem`
document.getElementById(`game`).appendChild(div);

div = document.createElement(`span`);
div.id = `answer`
document.getElementById(`game`).appendChild(div);

div = document.createElement(`span`);
div.id = `buttonSpan`
document.getElementById(`game`).appendChild(div);

div = document.createElement(`button`);
div.id = `button`
div.style.fontSize = `1em`;
div.innerHTML = `OK`;
div.addEventListener(`click`, a2);
document.getElementById(`buttonSpan`).appendChild(div);

document.getElementById(`game`).style.fontSize = `3em`;

let numbers1, numbers2, number1, number2, answer, answerString, index, problem;
let level = 1;
let problems = [];
let oldProblems = [];
let problemHistory = [];

for ( let i = 2; i < 11; i++ ) {

    for ( let j = 2; j < 11; j++ ) {
    
        problemHistory.push ( [i,j]);
        
    }

}

let minimum = 0;
let maximum = 14;

function generateAProblem () {
	
	if ( problems.length == 0 ) {

        generateASet ();
		
	}
	

	problem = problems.splice(Math.floor(Math.random () * problems.length ), 1)[0];
	
	if ( Math.random () < 0.5 ) {
		let temp = problem[0];
		problem[0] = problem[1];
		problem[1] = temp;
	}
	
	answer = problem[0] * problem[1];
	answerString = answer.toString();
	
	document.getElementById(`problem`).innerHTML = `${problem[0]} x ${problem[1]} = `;
	document.getElementById(`answer`).innerHTML = ``;
	document.getElementById(`buttonSpan`).style.display = `none`;
	
	index = 0;
	
}


function generateASet () {
		
	problems = [...oldProblems];
		
	let newProblem;
	while (true ){
	
		newProblem = [ Math.floor(Math.random()*maximum), Math.floor(Math.random()*maximum) ];
		
		if ( newProblem[0] < 2 || newProblem[1] < 2 ) continue;
		if ( newProblem[0] < 12 && newProblem[1] < 12 ) continue;
		
		let found = 0;
		for ( let i = 0; i < problems.length && !found; i++ ) {
			if ( problems[i][0] == newProblem[0] && problems[i][1] == newProblem[1] ) found = true;
			if ( problems[i][0] == newProblem[1] && problems[i][1] == newProblem[0] ) found = true;
		}
		if ( !found ) break;
	}
    
    problems.push ( newProblem );
    
    oldProblems = [...problems];
	
}

generateASet ();
generateAProblem ();


document.addEventListener(`keypress`, a1);

function a1(event) {
	if ( event.key == answerString[index] ) {
		document.getElementById(`answer`).innerHTML += event.key;
		if ( ++index == answerString.length ) {
			problemHistory.push(problem);
			generateAProblem ();
		}
	}
	else {
		document.getElementById(`answer`).innerHTML = answerString;
		document.getElementById(`buttonSpan`).style.display = `inline-block`;
		document.removeEventListener(`keypress`, a1);
		problems.push(problem);
		
	}
}
function a2 ( event ) {

	document.addEventListener(`keypress`, a1);
	document.getElementById(`buttonSpan`).style.display = `none`;
	generateAProblem ();
}
    </script>
</body>
